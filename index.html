<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One moment...</title>
  
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-4P3WNCPQE8"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "G-4P3WNCPQE8", { send_page_view: false });

    const routes = {
      // ADD NEW PRODUCTS HERE — one line per product
      "sc_001_v1_gumroad":  { dest: "https://thescribbleclub.gumroad.com/l/sudoku-vol-1", label: "gumroad_sc_001_v1" },
      "sc_001_v1_payhip":   { dest: "https://payhip.com/b/6R012", label: "payhip_sc_001_v1" },
      "sudoku1":      { dest: "YOUR_AMAZON_ATTRIBUTION_URL", label: "amazon_sudoku_v1" },
      "sudoku1_etsy": { dest: "YOUR_ETSY_UTM_URL",           label: "etsy_sudoku_v1"  },
      "sudoku1_gum":  { dest: "https://thescribbleclub.gumroad.com/l/sudoku-vol-1", label: "gumroad_sudoku"  },
      "sudoku1_pay":  { dest: "https://payhip.com/b/6R012",  label: "payhip_sudoku"   },
      "default":      { dest: "https://AmitJain48-web.github.io/links/", label: "homepage" }
    };

    window.addEventListener("DOMContentLoaded", function() {
      const params  = new URLSearchParams(window.location.search);
      const product = params.get("product") || "default";
      const ref     = params.get("ref") || "direct";
      const route   = routes[product] || routes["default"];
      document.getElementById("dest").textContent = route.label;
      gtag("event", "outbound_redirect", {
        product_code: route.label,
        traffic_source: ref,
        event_callback: function() { window.location.replace(route.dest); },
        event_timeout: 2000
      });
    });
  </script>
</head>
<body style="font-family:Arial,sans-serif;text-align:center;padding:80px 20px;background:#f9f9f9;color:#555;">
  <p>Taking you to <strong id="dest">your destination</strong>...</p>
  <p style="font-size:12px;">
    If nothing happens,
    <a href="https://AmitJain48-web.github.io/links/">click here</a>.
  </p>
</body>
</html>
